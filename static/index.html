<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StepWise — governed agent</title>
<style>
  :root { --bg:#0f1320; --card:#181d2e; --line:#2a3147; --txt:#e7ebf5;
          --muted:#9aa4be; --accent:#5b8cff; --good:#3ecf8e; --bad:#f0696b; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
  .wrap { max-width:800px; margin:0 auto; padding:32px 20px 64px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .badge { font-size:11px; color:var(--good); border:1px solid var(--good); border-radius:6px; padding:1px 6px; margin-left:6px; }
  .sub { color:var(--muted); margin:0 0 22px; }
  .row { display:flex; gap:8px; }
  input { flex:1; padding:12px 14px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--txt); font-size:15px; }
  button { padding:12px 18px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .chips { margin:14px 0 4px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { font-size:13px; color:var(--muted); border:1px solid var(--line); background:transparent; padding:6px 10px; border-radius:999px; cursor:pointer; }
  .chip:hover { color:var(--txt); border-color:var(--accent); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-top:18px; }
  .answer { font-size:17px; }
  .answer.bad { color:var(--bad); }
  .meta { color:var(--muted); font-size:12.5px; margin-top:8px; }
  .h { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; margin:16px 0 8px; }
  .step { border-left:2px solid var(--line); padding:6px 0 6px 12px; margin:8px 0; }
  .step.ok { border-color:var(--good); }
  .step.fail { border-color:var(--bad); }
  .tool { font-family:ui-monospace,Menlo,monospace; font-size:13px; color:var(--accent); }
  .res { font-size:13px; color:var(--txt); margin-top:2px; }
  .err { font-size:13px; color:var(--bad); margin-top:2px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>StepWise <span class="badge">demo</span></h1>
  <p class="sub">A governed agent: it plans steps, runs only allow-listed tools (with a hard step cap),
     and shows every step — so the answer is auditable, not a black box.</p>

  <div class="row">
    <input id="q" placeholder="e.g. What were total sales, and what's our return policy?" autofocus />
    <button id="go">Run</button>
  </div>
  <div class="chips" id="chips"></div>
  <div id="out"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

async function loadSamples(){
  try {
    const { samples } = await (await fetch('/api/samples')).json();
    $('chips').innerHTML = samples.map(s => `<button class="chip">${esc(s)}</button>`).join('');
    document.querySelectorAll('.chip').forEach(c =>
      c.addEventListener('click', () => { $('q').value = c.textContent; run(); }));
  } catch(e){}
}

function renderTrace(trace){
  if(!trace || !trace.length) return '';
  const rows = trace.map((t,i) => {
    const args = Object.values(t.args || {}).map(esc).join(', ');
    const body = t.ok
      ? `<div class="res">${esc(JSON.stringify(t.result))}</div>`
      : `<div class="err">${esc(t.error)}</div>`;
    return `<div class="step ${t.ok?'ok':'fail'}">
        <span class="tool">${i+1}. ${esc(t.tool)}(${args})</span>${body}</div>`;
  }).join('');
  return `<div class="h">Plan &amp; execution trace</div>${rows}`;
}

function render(res){
  if(res.error){ $('out').innerHTML = `<div class="card">${esc(res.error)}</div>`; return; }
  $('out').innerHTML = `<div class="card">
      <div class="answer ${res.ok?'':'bad'}">${esc(res.answer)}</div>
      <div class="meta">${res.ok?'verified':'could not verify'} · planner: ${esc(res.mode)} · step cap: ${res.max_steps}</div>
      ${renderTrace(res.trace)}
    </div>`;
}

async function run(){
  const request = $('q').value.trim();
  if(!request) return;
  $('go').disabled = true;
  $('out').innerHTML = `<div class="card meta">Planning &amp; running…</div>`;
  try {
    const r = await fetch('/api/run', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ request }) });
    render(await r.json());
  } catch(e){ $('out').innerHTML = `<div class="card">Request failed: ${esc(e.message)}</div>`; }
  finally { $('go').disabled = false; }
}

$('go').addEventListener('click', run);
$('q').addEventListener('keydown', e => { if(e.key==='Enter') run(); });
loadSamples();
</script>
</body>
</html>
